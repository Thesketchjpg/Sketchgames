<!DOCTYPE html>
<html>
  <head>
    <title>Sketchgames/vercel</title>
    <style>
      body {
        background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #2d0052 100%);
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        font-family: 'Arial', sans-serif;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
        pointer-events: none;
        z-index: 1;
      }

      h1 {
        color: #00bfff;
        font-size: 30px;
        text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
        position: relative;
        z-index: 2;
      }

      h2 {
        color: #ffd700;
        font-size: 20px;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        position: relative;
        z-index: 2;
      }

      div {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        position: relative;
        z-index: 2;
      }

      a {
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
      }

      a:hover {
        transform: scale(1.1) rotateY(5deg);
        filter: brightness(1.2);
      }

      img {
        height: 150px;
        border-radius: 30px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        border: 2px solid rgba(0, 191, 255, 0.5);
      }

      img:hover {
        box-shadow: 0 0 40px rgba(0, 191, 255, 0.8), 0 0 60px rgba(138, 43, 226, 0.6);
        border-color: #ffd700;
      }
    </style>
  </head>
  
  <body>
    <h1>sketchgames/vercel, by TheSketchjpg</h1>
    <h2>Play your Favorite games here</h2>
    <div>
      <a href="/g/1.html"><img src="/i/1.png" alt="bad piggies"></a>
      <a href="/g/2.html"><img src="/i/2.png" alt="geometry dash"></a>
      <a href="/g/3.html"><img src="/i/3.png" alt="FNAF"></a>
      <a href="/g/4.html"><img src="/i/4.png" alt="Stickman Hook"></a>
      <a href="/g/5.html"><img src="/i/5.png" alt="Crazy Cattle 3D"></a>
      <a href="/g/6.html"><img src="/i/6.png" alt="Crossy Road"></a>
    </div>
  </body>
</html>
