<!DOCTYPE html>
<html>
  <head>
    <title>sketch games</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style>
      body {
        background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #2d0052 100%);
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        font-family: 'Arial', sans-serif;
        position: relative;
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
        pointer-events: none;
        z-index: 1;
      }

      p {
        position: relative;
        z-index: 2;
        text-align: center;
        color: #00bfff;
        font-size: 24px;
        text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
      }

      div {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      img {
        height: 200px;
        margin-bottom: 20px;
        border-radius: 30px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        border: 2px solid rgba(0, 191, 255, 0.5);
      }

      img:hover {
        box-shadow: 0 0 40px rgba(0, 191, 255, 0.8), 0 0 60px rgba(138, 43, 226, 0.6);
        border-color: #ffd700;
        transform: scale(1.1);
      }

      a {
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
        color: #ffd700;
        font-size: 20px;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
      }

      a:hover {
        transform: scale(1.1);
        filter: brightness(1.2);
      }
    </style>
  </head>
  <body>
    <div>
      <img src="i/logo.png" alt="sketch games logo">
      <p>by thesketchjpg and xhbshefj</p>
      <a href="/games/">games</a>
      <a href="https://nebula-v6-proxy.vercel.app/">Nebula by xhbsehfj</a>
    </div>
  </body>
</html>
